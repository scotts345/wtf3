<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
</head>
<body style="font-family: 'Avenir', 'Avenir Light', sans-serif; background: transparent;">

<form action="https://api.web3forms.com/submit" method="POST" style="max-width:600px;margin:auto;">

  <input type="hidden" name="access_key" value="05590fc0-3648-44ea-83bf-813514af5241">

  <div style="display:flex; gap:40px;">
    <input type="email" name="email" placeholder="Email *" required style="flex:1;border:none;border-bottom:1px solid #aaa;background:transparent;padding:10px 0;font-weight:300;">
    <input type="text" name="name" placeholder="Name *" required style="flex:1;border:none;border-bottom:1px solid #aaa;background:transparent;padding:10px 0;font-weight:300;">
  </div>

  <input type="text" name="subject" placeholder="Subject" style="width:100%;border:none;border-bottom:1px solid #aaa;background:transparent;padding:10px 0;margin-top:30px;font-weight:300;">

  <textarea name="message" placeholder="Message" required style="width:100%;height:120px;border:none;border-bottom:1px solid #aaa;background:transparent;padding:10px 0;margin-top:30px;font-weight:300;"></textarea>

  <div style="text-align:center;">
    <button type="submit" style="margin-top:25px;background:transparent;border:none;font-weight:300;letter-spacing:0.1em;cursor:pointer;">
      SEND
    </button>
  </div>

</form>

</body>
</html>
